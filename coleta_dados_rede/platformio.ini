; PlatformIO Project Configuration File
[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

lib_deps =
  bodmer/TFT_eSPI@^2.4.67
  marian-craciunescu/ESP32Ping
  witnessmenow/UniversalTelegramBot
  bblanchon/ArduinoJson

monitor_speed = 115200
upload_speed = 115200

build_flags =
  -D ARDUINO_USB_MODE=1
  -D USER_SETUP_LOADED=1       
  
  ; --- A SOLUÇÃO DO SILÍCIO (MUDANÇA DE DRIVER) ---
  ; Removemos o ILI9341 e invocamos o controlador real das versões USB-C
  -D ST7789_DRIVER=1           
  -D TFT_RGB_ORDER=TFT_BGR     ; Ordem de cores padrão do ST7789
  -D TFT_INVERSION_OFF=1       ; Evita que as cores fiquem invertidas (efeito negativo)
  
  -D TFT_WIDTH=240            
  -D TFT_HEIGHT=320                     
  -D TFT_MISO=12               
  -D TFT_MOSI=13
  -D TFT_SCLK=14
  -D TFT_CS=15
  -D TFT_DC=2
  -D TFT_RST=-1
  -D TFT_BL=21
  -D TFT_BACKLIGHT_ON=HIGH
  -D LOAD_GLCD=1
  -D LOAD_FONT2=1
  -D LOAD_FONT4=1
  -D LOAD_FONT6=1
  -D LOAD_FONT7=1
  -D LOAD_FONT8=1
  -D LOAD_GFXFF=1
  -D SMOOTH_FONT=1
  -D SPI_FREQUENCY=40000000